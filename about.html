<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Var's Homestead</title>
  <meta name="description" content="The Homestead is under construction." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Calistoga&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Orbitron:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />
</head>
<body>

  <!-- ============ HOMESTEAD TOP BAR ============ -->
  <header class="homestead-bar">
    <h1 class="homestead-title">The Homestead</h1>
  </header>

  <nav style="padding:0.6rem 1.5rem; background:var(--color-bg-primary); border-bottom:1px solid var(--color-border);">
    <a href="index.html" style="font-family:var(--font-pixel);font-size:0.45rem;color:var(--color-text-muted);">&#8592; Return to Main</a>
  </nav>

  <!-- ============ UNDER CONSTRUCTION ============ -->
  <main style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:var(--space-5) var(--space-3); text-align:center;">
    <p style="font-family:var(--font-pixel); font-size:0.55rem; color:var(--color-text-muted); letter-spacing:0.08em; line-height:2.2;">
      The Homestead is under construction.<br>
      If you're bored, feel free to indulge in this
      <a href="https://www.youtube.com/watch?v=MPiGbYq0K5o" target="_blank" rel="noopener noreferrer" style="color:var(--color-lantern); text-decoration:underline;">video</a>.
    </p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Josh Varley &ndash; built with HTML, CSS &amp; Raw milk. &nbsp;|&nbsp; v0.21.2</p>
    </div>
  </footer>

  <script>
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>

</body>
</html>
