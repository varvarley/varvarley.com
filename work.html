document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.05em;color:rgba(240,236,248,0.7);text-decoration:none;\">Main<\u002Fa><\u002Fli>\n          <li><a href=\"work.html\" style=\"font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.05em;color:#f0ecf8;text-decoration:none;border-bottom:2px solid #f0ecf8;padding-bottom:2px;\">Work<\u002Fa><\u002Fli>\n          <li><a href=\"about.html\" style=\"font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.05em;color:rgba(240,236,248,0.7);text-decoration:none;\">The Homestead<\u002Fa><\u002Fli>\n          <li><a href=\"varchive.html\" style=\"font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.05em;color:rgba(240,236,248,0.7);text-decoration:none;\">Varchive<\u002Fa><\u002Fli>\n          <li><a href=\"contact.html\" style=\"font-family:'Press Start 2P',monospace;font-size:0.5rem;letter-spacing:0.05em;color:rgba(240,236,248,0.7);text-decoration:none;\">Contact<\u002Fa><\u002Fli>\n        <\u002Ful>\n        <span style=\"color:#8878a8;display:flex;line-height:1;\" aria-hidden=\"true\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 8 8\" style=\"image-rendering:pixelated;\">\n            <rect fill=\"currentColor\" x=\"2\" y=\"0\" width=\"2\" height=\"1\"><\u002Frect><rect fill=\"currentColor\" x=\"1\" y=\"1\" width=\"3\" height=\"1\"><\u002Frect><rect fill=\"currentColor\" x=\"0\" y=\"2\" width=\"3\" height=\"1\"><\u002Frect><rect fill=\"currentColor\" x=\"0\" y=\"3\" width=\"2\" height=\"2\"><\u002Frect><rect fill=\"currentColor\" x=\"0\" y=\"5\" width=\"3\" height=\"1\"><\u002Frect><rect fill=\"currentColor\" x=\"1\" y=\"6\" width=\"3\" height=\"1\"><\u002Frect><rect fill=\"currentColor\" x=\"2\" y=\"7\" width=\"2\" height=\"1\"><\u002Frect>\n          <\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <div style=\"background:#111111;padding:4rem 0 2.5rem;position:relative;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:0 1.5rem;\">\n      <h1 style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,5rem);letter-spacing:0.06em;margin:0 0 0.5rem;color:#f0ecf8;line-height:1.05;\">Work<\u002Fh1>\n      <p style=\"font-family:'Press Start 2P',monospace;font-size:0.42rem;color:#8878a8;margin:0;letter-spacing:0.04em;\">What I've Built<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,#c02860 25%,#e86018 75%,transparent 100%);opacity:0.55;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:2rem 0 0;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:0 1.5rem;\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:0.6rem;align-items:center;\">\n        <span style=\"font-family:'Press Start 2P',monospace;font-size:0.38rem;color:#8878a8;letter-spacing:0.12em;margin-right:0.4rem;\">FILTER<\u002Fspan>\n        <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <section style=\"padding:2.25rem 0 1rem;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:0 1.5rem;\">\n      <div style=\"max-width:600px;padding-left:1.25rem;border-left:2px solid rgba(229,46,92,0.24);\">\n        <p style=\"font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:#8878a8;letter-spacing:0.2em;text-transform:lowercase;margin:0 0 1rem;\">work<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;\">\n          <p style=\"font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:#f0ecf8;line-height:1.75;font-style:italic;margin:0 0 0.9rem;\">I've done a lot of work.<br>I've done work to make me money,<br>I've done work for my resume,<br>I've done a lot of homework.<\u002Fp>\n          <p style=\"font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:#f0ecf8;line-height:1.75;font-style:italic;margin:0 0 0.9rem;\">I've done mental, physical, emotional, social, and spiritual work.<br>I've also done work that might not seem like work.<\u002Fp>\n          <p style=\"font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:#f0ecf8;line-height:1.75;font-style:italic;margin:0 0 0.9rem;\">Work that creates memories,<br>scratches creative itches,<br>fulfills favors,<br>drives new desires,<br>and revives childhood obsessions.<\u002Fp>\n          <p style=\"font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:#f0ecf8;line-height:1.75;font-style:italic;margin:0;\">I've found myself enjoying and testing different ways of working for a while now.<br>What do I want to do for work?<br>I guess I'm still working on it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n    <section style=\"{{ sec.sectionStyle }}\">\n      <div style=\"max-width:1100px;margin:0 auto;padding:0 1.5rem;\">\n        <span style=\"display:block;font-family:'Press Start 2P',monospace;font-size:0.38rem;color:rgba(192,40,96,0.7);letter-spacing:0.18em;margin-bottom:0.5rem;\">{{ sec.index }}<\u002Fspan>\n        <h2 style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,3.5vw,2.4rem);letter-spacing:0.06em;margin:0 0 0.5rem;color:#f0ecf8;line-height:1.15;\">{{ sec.title }}<\u002Fh2>\n        <p style=\"max-width:640px;margin:0 0 2.5rem;color:#8878a8;\">{{ sec.lede }}<\u002Fp>\n        <div style=\"{{ sec.gridStyle }}\">\n          <sc-for list=\"{{ sec.cards }}\" as=\"card\" hint-placeholder-count=\"3\">\n            <a ref=\"{{ card.setRef }}\" data-card-id=\"{{ card.id }}\" href=\"{{ card.href }}\" onmouseenter=\"{{ card.onEnter }}\" onmouseleave=\"{{ card.onLeave }}\" style=\"{{ card.cardStyle }}\">\n              <sc-if value=\"{{ card.showBar }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ card.barStyle }}\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:#c0645a;flex-shrink:0;\"><\u002Fspan>\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:#c8a040;flex-shrink:0;\"><\u002Fspan>\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:#7aaa5e;flex-shrink:0;\"><\u002Fspan>\n                  <span style=\"{{ card.barFileStyle }}\">{{ card.barFile }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ card.showImage }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ card.imgWrapStyle }}\">\n                  <div style=\"{{ card.imgInnerStyle }}\"><\u002Fdiv>\n                  <span style=\"{{ card.imgLabelStyle }}\">{{ card.imgLabel }}<\u002Fspan>\n                  <span style=\"{{ card.badgeStyle }}\">{{ card.badge }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"{{ card.bodyStyle }}\">\n                <sc-if value=\"{{ card.showInlineBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"{{ card.inlineBadgeStyle }}\">{{ card.badge }}<\u002Fspan>\n                <\u002Fsc-if>\n                <h3 style=\"{{ card.titleStyle }}\">{{ card.title }}<\u002Fh3>\n                <p style=\"{{ card.descStyle }}\">{{ card.desc }}<\u002Fp>\n                <ul style=\"display:flex;flex-wrap:wrap;gap:0.45rem;margin-top:auto;padding-top:0.6rem;\">\n                  <sc-for list=\"{{ card.tags }}\" as=\"tag\" hint-placeholder-count=\"2\">\n                    <li style=\"{{ card.tagStyle }}\">{{ tag }}<\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n              <\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-for>\n\n  <footer style=\"padding:1.5rem 0;border-top:1px solid #222222;text-align:center;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:0 1.5rem;\">\n      <p style=\"font-family:'Press Start 2P',monospace;font-size:0.45rem;color:#8878a8;margin:0;line-height:2;\">© 2026 Josh Varley — built with HTML, CSS &amp; Raw milk. &nbsp;|&nbsp; v0.17.0<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;treatment&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;cartridge&quot;,&quot;terminal&quot;,&quot;minimal&quot;],&quot;default&quot;:&quot;cartridge&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;layout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;featured&quot;,&quot;uniform&quot;],&quot;default&quot;:&quot;featured&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ceade8&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { activeFilter: 'all', hovered: null, visible: {} };\n\n  componentDidMount() {\n    this._nodes = this._nodes || new Map();\n    this._check = this._check.bind(this);\n    window.addEventListener('scroll', this._check, { passive: true });\n    window.addEventListener('resize', this._check, { passive: true });\n    requestAnimationFrame(() => this._check());\n    this._t1 = setTimeout(this._check, 120);\n    this._t2 = setTimeout(this._check, 400);\n    // Safety net: ensure every card is visible even if scroll never fires\n    // (full-page export, print, throttled/background render contexts).\n    this._t3 = setTimeout(() => this._revealAll(), 1600);\n  }\n  _revealAll() {\n    const v = { ...this.state.visible }; let ch = false;\n    document.querySelectorAll('[data-card-id]').forEach(n => {\n      const id = n.getAttribute('data-card-id');\n      if (id && !v[id]) { v[id] = true; ch = true; }\n    });\n    if (ch) this.setState({ visible: v });\n  }\n  componentDidUpdate() { if (this._check) this._check(); }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._check);\n    window.removeEventListener('resize', this._check);\n    clearTimeout(this._t1); clearTimeout(this._t2); clearTimeout(this._t3);\n  }\n  _check() {\n    const vh = window.innerHeight || document.documentElement.clientHeight;\n    const nodes = document.querySelectorAll('[data-card-id]');\n    let ch = false; const v = { ...this.state.visible };\n    nodes.forEach((n) => {\n      const id = n.getAttribute('data-card-id');\n      if (!id || v[id]) return;\n      const r = n.getBoundingClientRect();\n      if (r.top < vh * 0.92 && r.bottom > 0) { v[id] = true; ch = true; }\n    });\n    if (ch) this.setState({ visible: v });\n  }\n\n  setCardRef = (node) => {\n    if (!node) return;\n    const id = node.getAttribute('data-card-id');\n    if (id) (this._nodes = this._nodes || new Map()).set(id, node);\n  };\n\n  renderVals() {\n    const ease = 'cubic-bezier(0.23,1,0.32,1)';\n    const shadowCard = '0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04)';\n    const shadowHover = '0 4px 24px rgba(192,40,96,0.25), 0 8px 40px rgba(0,0,0,0.7)';\n    const fPixel = \"'Press Start 2P', monospace\";\n    const fBody = \"'JetBrains Mono', monospace\";\n    const fHeading = \"'Bebas Neue', sans-serif\";\n    const fDisplay = \"'Calistoga', serif\";\n\n    const treatment = this.props.treatment || 'cartridge';\n    const layoutMode = this.props.layout || 'featured';\n    const accent = this.props.accent || '#c02860';\n\n    const CAT = {\n      technical: { grad: 'linear-gradient(150deg,#04211f,#05cdc2)', tint: '#05cdc2', label: 'Technical', ext: 'sql' },\n      creative:  { grad: 'linear-gradient(150deg,#2a2a2c,#f0ecf1)', tint: '#f0ecf1', label: 'Creative', ext: 'fig' },\n      people:    { grad: 'linear-gradient(150deg,#1b1030,#9952de)', tint: '#9952de', label: 'People', ext: 'md' },\n    };\n\n    const DATA = [\n      { id: 'technical', index: '01', title: 'Technical', lede: 'Data pipelines, systems, and anything that involves a lot of SQL.', cards: [\n        { id: 't1', featured: true, title: 'Featured Project Title', year: '2024', slug: 'pipeline', desc: 'VAR2-D2 is still compiling this one. Check back later.', tags: ['SQL', 'dbt', 'Snowflake', 'Python'] },\n        { id: 't2', title: 'Project B', year: '2023', slug: 'orchestration', desc: 'VAR2-D2 rerouted power to another query. Check back later.', tags: ['Airflow', 'BigQuery'] },\n        { id: 't3', title: 'Project C', year: '2023', slug: 'infra', desc: 'VAR2-D2 is running diagnostics on a bigger build. Check back later.', tags: ['Terraform', 'AWS'] },\n        { id: 't4', title: 'Project D', year: '2022', slug: 'reporting', desc: 'VAR2-D2 beeped something about a deadline. Check back later.', tags: ['Postgres', 'Metabase'] },\n      ]},\n      { id: 'creative', index: '02', title: 'Creative', lede: 'Design work, side projects, and things made for the fun of it.', cards: [\n        { id: 'c1', featured: true, title: 'Featured Creative Work', year: '2024', slug: 'showcase', desc: 'The Vartisan is off chasing a new muse. Check back later.', tags: ['Design', 'HTML/CSS', 'Figma'] },\n        { id: 'c2', title: 'Side Project', year: '2023', slug: 'sideproject', desc: 'The Vartisan stepped away mid-brushstroke. Check back later.', tags: ['Illustration'] },\n        { id: 'c3', title: 'Visual Work', year: '2022', slug: 'visual', desc: 'The Vartisan is still mixing the right shade. Check back later.', tags: ['Brand', 'Print'] },\n      ]},\n      { id: 'people', index: '03', title: 'People', lede: 'Work done with and for people — collaboration, facilitation, and community.', cards: [\n        { id: 'p1', featured: true, title: 'Featured People Work', year: '2024', slug: 'leadership', desc: 'Varty McFly is out making connections across town. Check back later.', tags: ['Leadership', 'Facilitation', 'Workshop'] },\n        { id: 'p2', title: 'Community Work', year: '2023', slug: 'community', desc: 'Varty McFly took the DeLorean to a meeting. Check back later.', tags: ['Community', 'Events'] },\n        { id: 'p3', title: 'Collaboration', year: '2022', slug: 'collab', desc: 'Varty McFly is busy with others right now. Check back later.', tags: ['Mentorship'] },\n      ]},\n    ];\n\n    // ── Filter chips ──\n    const filterDefs = [{ id: 'all', label: 'All' }, { id: 'technical', label: 'Technical' }, { id: 'creative', label: 'Creative' }, { id: 'people', label: 'People' }];\n    const filters = filterDefs.map(f => {\n      const active = this.state.activeFilter === f.id;\n      return {\n        label: f.label,\n        onClick: () => this.setState({ activeFilter: f.id }),\n        style: [\n          `font-family:${fPixel}`, 'font-size:0.42rem', 'letter-spacing:0.05em', 'cursor:pointer',\n          'padding:0.55rem 0.8rem', 'border-radius:4px', 'transition:all 150ms ' + ease,\n          active ? `background:${accent}` : 'background:transparent',\n          active ? 'color:#080808' : 'color:#8878a8',\n          active ? `border:1px solid ${accent}` : '1px solid #2e2e2e' && 'border:1px solid #2e2e2e',\n        ].join(';'),\n      };\n    });\n\n    // ── Card builder ──\n    const buildCard = (card, cat, isFeatured) => {\n      const visible = !!this.state.visible[card.id];\n      const hovered = this.state.hovered === card.id;\n      const lift = hovered && visible;\n\n      let cardBg, cardBorder;\n      if (treatment === 'terminal') { cardBg = '#141210'; cardBorder = '1px solid #2e2e2e'; }\n      else if (treatment === 'minimal') { cardBg = '#111111'; cardBorder = '1px solid #222222'; }\n      else { cardBg = '#1a1a1a'; cardBorder = '1px solid #2e2e2e'; }\n\n      const cardStyle = [\n        'position:relative', 'display:flex', `flex-direction:${isFeatured ? 'row' : 'column'}`,\n        'text-decoration:none', 'color:inherit', 'overflow:hidden',\n        `background:${cardBg}`, `border:${cardBorder.replace('1px solid ', '')}` && `border:${cardBorder}`,\n        treatment === 'minimal' ? `border-left:3px solid ${cat.tint}` : 'border-radius:8px',\n        treatment === 'minimal' ? 'border-radius:6px' : '',\n        isFeatured ? 'grid-column:1 / -1' : '',\n        `box-shadow:${lift ? shadowHover : shadowCard}`,\n        `opacity:${visible ? 1 : 0}`,\n        `transform:${lift ? 'translateY(-6px)' : 'none'}`,\n        `transition:transform 260ms ${ease}, box-shadow 260ms ${ease}`,\n        'will-change:transform',\n      ].filter(Boolean).join(';');\n\n      // image\n      const showImage = treatment !== 'minimal';\n      const imgWrapStyle = [\n        'position:relative', 'overflow:hidden', `background:${cat.grad}`,\n        isFeatured ? 'flex:0 0 46%' : 'width:100%',\n        isFeatured ? 'min-height:240px' : 'aspect-ratio:4/3',\n        treatment === 'terminal' ? 'margin:0' : '',\n      ].filter(Boolean).join(';');\n      const imgInnerStyle = [\n        'position:absolute', 'inset:0',\n        \"background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.05) 0,rgba(255,255,255,0.05) 2px,transparent 2px,transparent 9px)\",\n        `transform:scale(${hovered ? 1.06 : 1})`, `transition:transform 500ms ${ease}`,\n      ].join(';');\n      const imgLabelStyle = [\n        'position:absolute', 'left:50%', 'top:50%', 'transform:translate(-50%,-50%)',\n        `font-family:${fBody}`, 'font-size:0.7rem', `color:${cat.tint}`,\n        'background:rgba(8,6,10,0.5)', 'padding:0.4rem 0.7rem', 'border-radius:4px', 'backdrop-filter:blur(2px)',\n        'letter-spacing:0.04em', 'pointer-events:none', 'white-space:nowrap',\n      ].join(';');\n      const imgLabel = '// ' + card.slug + '.' + (cat.ext === 'sql' ? 'png' : cat.ext === 'fig' ? 'png' : 'jpg');\n\n      // badge\n      const badge = isFeatured ? (cat.label + '  ·  ' + card.year) : card.year;\n      const badgeBase = [\n        `font-family:${fPixel}`, 'font-size:0.4rem', 'letter-spacing:0.05em', 'padding:0.45rem 0.6rem',\n        'border-radius:3px', 'white-space:nowrap',\n      ];\n      const badgeStyle = [...badgeBase,\n        'position:absolute', 'top:0.7rem', 'left:0.7rem',\n        'background:rgba(8,6,10,0.62)', 'backdrop-filter:blur(4px)',\n        `color:${cat.tint}`, `border:1px solid ${cat.tint}55`,\n      ].join(';');\n      const showInlineBadge = treatment === 'minimal';\n      const inlineBadgeStyle = [...badgeBase, 'align-self:flex-start', 'margin-bottom:0.8rem',\n        'background:transparent', `color:${cat.tint}`, `border:1px solid ${cat.tint}55`].join(';');\n\n      // terminal bar\n      const showBar = treatment === 'terminal';\n      const barStyle = ['display:flex', 'align-items:center', 'gap:6px', 'background:#242018',\n        'padding:9px 14px', 'border-bottom:1px solid rgba(255,255,255,0.06)',\n        isFeatured ? 'width:100%' : '', isFeatured ? 'order:-1' : ''].filter(Boolean).join(';');\n      const barFileStyle = [`font-family:${fPixel}`, 'font-size:0.38rem', 'color:#8878a8',\n        'margin-left:6px', 'letter-spacing:0.04em', 'white-space:nowrap', 'overflow:hidden', 'text-overflow:ellipsis'].join(';');\n      const barFile = '~/work/' + card.id.charAt(0) + '/' + card.slug + '.' + cat.ext;\n\n      // body\n      const bodyPad = isFeatured ? '2rem 2.25rem' : '1.4rem 1.4rem 1.5rem';\n      const bodyStyle = ['display:flex', 'flex-direction:column', 'flex:1', `padding:${bodyPad}`, 'min-width:0'].join(';');\n\n      let titleFont, titleSize;\n      if (treatment === 'minimal') { titleFont = fDisplay; titleSize = isFeatured ? '2rem' : '1.4rem'; }\n      else if (treatment === 'terminal') { titleFont = fBody; titleSize = isFeatured ? '1.5rem' : '1.15rem'; }\n      else { titleFont = fHeading; titleSize = isFeatured ? '1.9rem' : '1.3rem'; }\n      const titleStyle = [`font-family:${titleFont}`, `font-size:${titleSize}`,\n        treatment === 'terminal' ? 'font-weight:500' : '', 'color:#f0ecf8', 'margin:0 0 0.6rem',\n        treatment === 'minimal' ? 'line-height:1.2' : 'letter-spacing:0.03em', 'line-height:1.2'].filter(Boolean).join(';');\n\n      const descStyle = [`font-family:${fBody}`, isFeatured ? 'font-size:1rem' : 'font-size:0.88rem',\n        'color:#8878a8', 'line-height:1.7', 'margin:0 0 0.8rem',\n        !isFeatured ? 'display:-webkit-box' : '', !isFeatured ? '-webkit-line-clamp:3' : '',\n        !isFeatured ? '-webkit-box-orient:vertical' : '', !isFeatured ? 'overflow:hidden' : ''].filter(Boolean).join(';');\n\n      let tagStyle;\n      if (treatment === 'minimal') {\n        tagStyle = [`font-family:${fBody}`, 'font-size:0.72rem', 'font-style:italic', 'color:#8878a8',\n          'padding:0.15rem 0', `border-bottom:1px solid ${cat.tint}40`].join(';');\n      } else if (treatment === 'terminal') {\n        tagStyle = [`font-family:${fBody}`, 'font-size:0.72rem', `color:${cat.tint}`,\n          'background:rgba(255,255,255,0.04)', 'padding:0.25rem 0.5rem', 'border-radius:3px',\n          'border:1px solid rgba(255,255,255,0.08)'].join(';');\n      } else {\n        tagStyle = [`font-family:${fPixel}`, 'font-size:0.4rem', 'letter-spacing:0.04em', 'color:#d8c8f0',\n          'background:rgba(240,236,248,0.06)', 'padding:0.4rem 0.55rem', 'border-radius:2px',\n          'border:1px solid rgba(240,236,248,0.15)'].join(';');\n      }\n\n      return {\n        id: card.id, href: '#', title: card.title, desc: card.desc, tags: card.tags,\n        setRef: this.setCardRef,\n        onEnter: () => this.setState({ hovered: card.id }),\n        onLeave: () => this.setState({ hovered: null }),\n        cardStyle, showImage, imgWrapStyle, imgInnerStyle, imgLabelStyle, imgLabel,\n        badge, badgeStyle, showInlineBadge, inlineBadgeStyle,\n        showBar, barStyle, barFileStyle, barFile,\n        bodyStyle, titleStyle, descStyle, tagStyle,\n      };\n    };\n\n    // ── Sections view ──\n    const af = this.state.activeFilter;\n    const sections = DATA.filter(s => af === 'all' || s.id === af).map((s, si) => {\n      const cat = CAT[s.id];\n      const gridStyle = layoutMode === 'uniform'\n        ? 'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem'\n        : 'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem';\n      const cards = s.cards.map(c => buildCard(c, cat, layoutMode === 'featured' && c.featured));\n      const altBg = (DATA.indexOf(s) % 2 === 0) ? '' : 'background:#111111;';\n      const sectionStyle = `padding:4rem 0;${altBg}`;\n      return { index: s.index, title: s.title, lede: s.lede, sectionStyle, gridStyle, cards };\n    });\n\n    return { filters, sections };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
